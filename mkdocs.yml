site_name: Epistemic Confidence Layer
site_url: https://codessian.github.io/epistemic-confidence-layer/
repo_url: https://github.com/codessian/epistemic-confidence-layer
repo_name: codessian/epistemic-confidence-layer

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Overview: overview.md
  - Installation: installation.md
  - Tutorial: tutorial.md
  - Architecture: architecture.md
  - API: api.md
  - Troubleshooting: troubleshooting.md
  - Calibration: calibration.md
  - Governance: governance.md
  - Bots: bots.md
  - Operations: operations.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
