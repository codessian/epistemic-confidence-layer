name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint & typecheck
        run: |
          python -m ruff check .
          python -m mypy src

      - name: Unit tests
        run: |
          python -m pytest

      - name: Performance benchmark gate
        run: |
          python benchmarks/scripts/performance_suite.py --mode both --iterations 20 --load-factor 2 --output benchmarks/results/performance-suite.json --min-improvement-pct 30

      - name: Toy eval (reliability curve)
        run: |
          python benchmarks/scripts/plot_reliability.py --input benchmarks/tasks/toy.jsonl --output benchmarks/results/reliability.png

      - name: Dependency vulnerability scan
        run: |
          python -m pip_audit -r requirements.txt

      - name: Generate SBOM
        run: |
          python -m cyclonedx.bom.requirements requirements.txt -o sbom.json

      - name: Upload reliability curve
        uses: actions/upload-artifact@v4
        with:
          name: reliability-curve
          path: benchmarks/results/reliability.png

      - name: Upload performance suite
        uses: actions/upload-artifact@v4
        with:
          name: performance-suite
          path: benchmarks/results/performance-suite.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
