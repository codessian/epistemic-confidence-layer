name: Triage
on:
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, edited]
permissions:
  contents: read
  pull-requests: write
  issues: write
jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: '${{ secrets.GITHUB_TOKEN }}'
          configuration-path: .github/labeler.yml
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: >
            Welcome! 👋 Thanks for opening your first issue.
            Start here: https://codessian.github.io/epistemic-confidence-layer/tutorial/
            We label easy items as `good first issue`. Please include steps to reproduce and environment info.
          pr-message: >
            Thanks for your first PR! ✨
            Ensure tests/docs are updated and commits are DCO signed (`git commit -s`).
            Our bot will run evals and post ECE results below.