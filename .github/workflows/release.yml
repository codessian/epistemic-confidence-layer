name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g. v1.2.0)"
        required: true
      rollback_to:
        description: "Optional tag to rollback deployment to"
        required: false
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Verify quality gates
        run: |
          python -m ruff check .
          python -m mypy src
          python -m pytest
          python benchmarks/scripts/performance_suite.py --mode both --iterations 20 --load-factor 2 --output benchmarks/results/performance-suite.json --min-improvement-pct 30
          python -m pip_audit -r requirements.txt

      - name: Build container image
        run: |
          docker build -t ecl:${{ github.ref_name }} .

      - name: Scan container image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ecl:${{ github.ref_name }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Generate changelog
        uses: mikepenz/release-changelog-builder-action@v5
        id: changelog
        with:
          mode: "COMMIT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            benchmarks/results/performance-suite.json

  rollback:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.rollback_to != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Rollback target marker
        run: |
          echo "Rollback requested to tag: ${{ github.event.inputs.rollback_to }}"
          echo "Use your deployment system to redeploy image/tag ${{ github.event.inputs.rollback_to }}"
