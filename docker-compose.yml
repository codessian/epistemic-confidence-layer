services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ecl:local
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/livez').read()"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - eclnet

  tests:
    image: ecl:local
    command: ["python", "-m", "pytest", "-q"]
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    networks:
      - eclnet

networks:
  eclnet:
    driver: bridge
